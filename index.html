<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>[EVENT TITLE HERE]</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Header Section -->
  <header>
    <h1>[EVENT TITLE]</h1>
    <p>[EVENT TAGLINE / SHORT DESCRIPTION]</p>
  </header>

  <!-- Event Details -->
  <section class="event-details">
    <h2>About the Event</h2>
    <p>[WRITE EVENT DESCRIPTION HERE]</p>

    <ul>
      <li><strong>Date:</strong> [EVENT DATE]</li>
      <li><strong>Time:</strong> [EVENT TIME]</li>
      <li><strong>Location:</strong> [EVENT LOCATION]</li>
    </ul>
  </section>

  <!-- Registration Form -->
  <section class="form-section">
    <h2>Register Now</h2>

    <form id="registrationForm">

      <input type="text" placeholder="Full Name" required>
      
      <input type="email" placeholder="Email Address" required>

      <input type="tel" placeholder="Phone Number">

      <select required>
        <option value="">Select Ticket Type</option>
        <option>[TICKET TYPE 1]</option>
        <option>[TICKET TYPE 2]</option>
      </select>

      <textarea placeholder="Additional Message"></textarea>

      <button type="submit">Register</button>

    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>[CONTACT EMAIL OR INFO]</p>
  </footer>

  <script src="script.js"></script>
  
</body>
</html>
